<!DOCTYPE html>
<!-- Theme preview when site/ is the deployed root. Loads index.html in iframe. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme preview — Limn</title>
  <link rel="stylesheet" href="limn-engine.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.36.1/dist/tabler-icons.min.css">
  <style>
    .theme-selector {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: 12px 16px 16px;
      margin: 0 -16px 16px -16px;
      display: flex;
      justify-content: center;
    }

    .theme-selector label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--color-text-muted);
    }

    .theme-selector select {
      max-width: 200px;
      padding: 8px 12px;
      font-size: 0.9rem;
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      cursor: pointer;
    }

    .theme-selector select:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    .theme-selector a {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      text-decoration: none;
    }

    .theme-selector a:hover {
      color: var(--color-accent);
    }

    #theme-preview {
      width: 100%;
      min-height: 80vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="theme-selector">
    <label>
      Theme:
      <select id="theme-select" aria-label="Select theme">
        <option value="">Loading…</option>
      </select>
      <a href="../index.html">← Back</a>
    </label>
  </div>

  <iframe id="theme-preview" src="index.html?theme=dark" title="Theme preview"></iframe>

  <script type="module">
    import { applyTheme, loadTheme } from "./limn-engine.js";

    const THEMES = [
      "dark", "scarlet", "light", "nord", "dracula", "catppuccin",
      "gruvbox", "solarized", "retro", "monokai", "pink-pony-club", "mocha"
    ];

    function getInitialTheme() {
      const params = new URLSearchParams(location.search);
      const t = params.get("theme");
      return t && THEMES.includes(t) ? t : "dark";
    }

    function setUrlTheme(name) {
      const url = new URL(location.href);
      url.searchParams.set("theme", name);
      history.replaceState({}, "", url);
    }

    const select = document.getElementById("theme-select");
    const iframe = document.getElementById("theme-preview");

    select.innerHTML = THEMES.map(t => `<option value="${t}">${t}</option>`).join("");

    let currentTheme = getInitialTheme();
    select.value = currentTheme;
    iframe.src = "index.html?theme=" + encodeURIComponent(currentTheme);

    const themeData = await loadTheme(currentTheme);
    applyTheme(themeData);

    select.addEventListener("change", async () => {
      currentTheme = select.value;
      setUrlTheme(currentTheme);
      const data = await loadTheme(currentTheme);
      applyTheme(data);
      iframe.contentWindow?.postMessage({ type: "limn-theme", theme: currentTheme }, "*");
    });
  </script>
</body>
</html>
