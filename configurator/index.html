<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limn configurator</title>
  <link rel="stylesheet" href="../site/limn-engine.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.36.1/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="configurator.css">
</head>
<body>
  <div class="configurator">
    <a href="../index.html" class="back-link">← Back to Limn</a>
    <h1>Limn configurator</h1>
    <p class="subtitle">Fill in your details, then download a ready-to-deploy zip.</p>

    <div id="loadConfigWrap" class="load-config-wrap">
      <input type="file" id="loadConfigFile" accept=".yaml,.yml" hidden>
      <button type="button" class="btn btn-secondary" id="loadConfigBtn"><i class="ti ti-upload"></i> Load config</button>
      <span id="loadConfigStatus" class="load-config-status"></span>
    </div>

    <form id="form">
      <label for="name">Display Name</label>
      <input type="text" id="name" required placeholder="Your name" maxlength="80">

      <label for="bio">Bio (optional)</label>
      <textarea id="bio" placeholder="A short line about you" rows="3" maxlength="300"></textarea>

      <label>Profile image</label>
      <div class="profile-image-picker">
        <div class="profile-image-controls">
          <div class="profile-image-mode">
            <label class="profile-image-mode-opt">
              <input type="radio" name="profileImageMode" value="default" checked>
              <span>Default</span>
            </label>
            <label class="profile-image-mode-opt">
            <input type="radio" name="profileImageMode" value="upload">
            <span>File</span>
            </label>
            <label class="profile-image-mode-opt">
              <input type="radio" name="profileImageMode" value="url">
              <span>URL</span>
            </label>
          </div>
          <div class="profile-image-upload" id="profileImageUpload" hidden>
            <input type="file" id="profileImageFile" accept="image/*" hidden>
            <button type="button" class="btn btn-secondary" id="profileImageFileBtn"><i class="ti ti-upload"></i> Choose file</button>
            <span class="profile-image-filename" id="profileImageFilename"></span>
          </div>
          <div class="profile-image-url" id="profileImageUrl" hidden>
            <input type="text" id="profileImageUrlInput" placeholder="https://example.com/photo.jpg" maxlength="1000">
          </div>
        </div>
        <div class="profile-image-preview" id="profileImagePreview"></div>
      </div>

      <label for="theme">Theme</label>
      <select id="theme">
        <option value="dark">dark</option>
        <option value="scarlet">scarlet</option>
        <option value="light">light</option>
        <option value="nord">nord</option>
        <option value="dracula">dracula</option>
        <option value="catppuccin">catppuccin</option>
        <option value="gruvbox">gruvbox</option>
        <option value="solarized">solarized</option>
        <option value="retro">retro</option>
        <option value="monokai">monokai</option>
        <option value="pink-pony-club">pink-pony-club</option>
        <option value="mocha">mocha</option>
      </select>

      <div class="tiles-section">
        <label>Pages & tiles</label>
        <p class="links-hint">Add pages, then add tiles to each. Use a linksbar with showLabels for page nav.</p>
        <div id="pages-stack"></div>
        <div class="add-page-wrap">
          <button type="button" class="btn btn-secondary add-page-btn" id="addPageBtn"><i class="ti ti-circle-plus"></i> Add page</button>
        </div>
      </div>

      <div class="download-section">
        <button type="submit" class="btn" id="downloadBtn">Download zip</button>
        <p id="status"></p>
      </div>
    </form>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
