<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limn configurator</title>
  <link rel="stylesheet" href="site/limn-engine.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.36.1/dist/tabler-icons.min.css">
  <style>
    .configurator {
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    .configurator h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .configurator .subtitle {
      color: var(--color-text-muted);
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .configurator label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--color-text);
    }
    .configurator input, .configurator select, .configurator textarea {
      width: 100%;
      padding: 10px 12px;
      font-size: 0.95rem;
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .configurator input:focus, .configurator select:focus, .configurator textarea:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    .configurator .links-section,
    .configurator .headings-section,
    .configurator .tiles-section {
      margin-bottom: 16px;
    }
    .configurator .tiles-section > label {
      margin-bottom: 4px;
    }
    .configurator .add-tile-wrap {
      position: relative;
      margin-top: 12px;
      display: flex;
      justify-content: center;
    }
    .configurator .page-group .add-tile-wrap {
      margin-top: 0;
      padding: 12px;
      padding-top: 0;
    }
    .configurator .page-group .add-tile-dropdown {
      left: 50%;
      transform: translateX(-50%);
    }
    .configurator .add-page-btn,
    .configurator .add-tile-btn-main,
    .configurator .add-link {
      padding: 10px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .configurator .add-tile-btn-main .add-tile-chevron {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-left: 2px;
      transition: transform 0.2s;
    }
    .configurator .add-tile-wrap.open .add-tile-chevron {
      transform: rotate(180deg);
    }
    .configurator .add-tile-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 6px;
      min-width: 200px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      padding: 6px;
      z-index: 100;
      display: none;
    }
    .configurator .add-tile-dropdown.open {
      display: block;
    }
    .configurator .add-tile-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--color-text);
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.12s;
    }
    .configurator .add-tile-option:hover {
      background: color-mix(in srgb, var(--color-accent) 18%, transparent);
    }
    .configurator .add-tile-option .ti {
      font-size: 1.1rem;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .configurator .tile-block {
      margin-bottom: 12px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--color-surface);
    }
    .configurator .tile-block-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: color-mix(in srgb, var(--color-border) 30%, transparent);
      border-bottom: 1px solid var(--color-border);
    }
    .configurator .tile-block-type {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-muted);
      text-transform: uppercase;
    }
    .configurator .tile-help-link {
      display: inline-flex;
      align-items: center;
      color: var(--color-text-muted);
      opacity: 0.7;
      text-decoration: none;
      transition: color 0.15s, opacity 0.15s;
    }
    .configurator .tile-help-link:hover {
      color: var(--color-accent);
      opacity: 1;
    }
    .configurator .page-title-bar .tile-help-link {
      margin-left: 2px;
    }
    .configurator .tile-block-actions {
      margin-left: auto;
      display: flex;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .configurator .tile-block-actions button {
      width: 28px;
      height: 28px;
      padding: 0;
      min-width: 28px;
      border: none;
      border-radius: 0;
      border-right: 1px solid var(--color-border);
    }
    .configurator .tile-block-actions button:last-child {
      border-right: none;
    }
    .configurator .tile-block-actions button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .configurator .tile-block-body {
      padding: 12px;
    }
    .configurator .links-hint {
      font-size: 0.85rem;
      color: var(--color-text-muted);
      margin: -4px 0 8px 0;
    }
    .configurator .page-group {
      margin-bottom: 20px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      overflow: visible;
      background: color-mix(in srgb, var(--color-border) 8%, transparent);
    }
    .configurator .page-group.selected {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px var(--color-accent);
    }
    .configurator .page-group.page-home .page-header-field-nav {
      display: none;
    }
    .configurator .page-title-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: color-mix(in srgb, var(--color-border) 30%, transparent);
      border-bottom: 1px solid var(--color-border);
      border-radius: 8px 8px 0 0;
    }
    .configurator .page-title-bar .page-title-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .configurator .page-title-bar .page-title-label .ti {
      font-size: 1rem;
    }
    .configurator .page-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: color-mix(in srgb, var(--color-border) 25%, transparent);
      border-bottom: 1px solid var(--color-border);
    }
    .configurator .page-header-fields {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .configurator .page-header-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .configurator .page-header-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 0;
      white-space: nowrap;
    }
    .configurator .page-header-field input[type="text"] {
      width: 100%;
      min-width: 0;
      padding: 6px 10px;
      font-size: 0.9rem;
      margin-bottom: 0;
      box-sizing: border-box;
    }
    .configurator .page-header-field:first-child,
    .configurator .page-header-field:last-child {
      flex: 0 0 auto;
    }
    .configurator .page-header-field .page-icon-trigger,
    .configurator .page-header-field .toggle-switch {
      flex-shrink: 0;
    }
    .configurator .page-header-field .toggle-switch,
    .configurator .tile-field .toggle-switch {
      position: relative;
      display: inline-block;
      width: 72px;
      height: 30px;
    }
    .configurator .page-header-field .toggle-switch input,
    .configurator .tile-field .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .configurator .page-header-field .toggle-slider,
    .configurator .tile-field .toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      transition: border-color 0.2s;
    }
    .configurator .page-header-field .toggle-slider::before,
    .configurator .tile-field .toggle-slider::before {
      content: "HIDE";
      position: absolute;
      height: 24px;
      width: 34px;
      left: 2px;
      top: 2px;
      background: var(--color-border);
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      line-height: 24px;
      text-align: center;
      letter-spacing: 0.02em;
      transition: transform 0.2s, background 0.2s, content 0.2s;
    }
    .configurator .page-header-field .toggle-switch input:checked + .toggle-slider::before,
    .configurator .tile-field .toggle-switch input:checked + .toggle-slider::before {
      content: "SHOW";
      transform: translateX(34px);
      background: var(--color-accent);
      color: var(--color-accent-text);
    }
    .configurator .page-tiles {
      padding: 12px;
      min-height: 40px;
    }
    .configurator .page-tiles .tile-block {
      margin-bottom: 12px;
    }
    .configurator .page-tiles .tile-block:last-child {
      margin-bottom: 0;
    }
    .configurator .add-page-wrap {
      margin: 12px 0;
      display: flex;
      justify-content: center;
    }
    .configurator .page-title-bar .tile-block-actions {
      margin-left: auto;
    }
    .configurator .page-header-field .page-icon-trigger {
      width: 30px;
      height: 30px;
      padding: 0;
      flex-shrink: 0;
      font-size: 1rem;
    }
    .configurator .link-row {
      display: flex;
      flex-direction: column;
      gap: 0;
      padding: 0;
      margin-bottom: 6px;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      overflow: hidden;
    }
    .configurator .link-row-header {
      display: flex;
      justify-content: flex-end;
      padding: 4px 6px;
      background: color-mix(in srgb, var(--color-border) 25%, transparent);
      border-bottom: 1px solid var(--color-border);
    }
    .configurator .link-row:last-child {
      margin-bottom: 0;
    }
    .configurator .link-row-actions {
      display: flex;
      flex-shrink: 0;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      overflow: hidden;
    }
    .configurator .link-row-actions button {
      width: 22px;
      height: 22px;
      padding: 0;
      min-width: 22px;
      font-size: 0.75rem;
      border: none;
      border-radius: 0;
      border-right: 1px solid var(--color-border);
    }
    .configurator .link-row-actions button:last-child {
      border-right: none;
    }
    .configurator .link-row-actions button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .configurator .link-row .link-row-fields {
      padding: 8px 10px;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .configurator .tile-block-body .links-section {
      margin-bottom: 0;
    }
    .configurator .tile-block-body .heading-input,
    .configurator .tile-block-body .text-content {
      width: 100%;
      margin-bottom: 0;
      font-family: inherit;
    }
    .configurator .tile-field {
      margin-bottom: 12px;
    }
    .configurator .tile-field:last-child {
      margin-bottom: 0;
    }
    .configurator .tile-field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }
    .configurator .tile-field-toggle {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .configurator .tile-field input,
    .configurator .tile-field select,
    .configurator .tile-field textarea {
      margin-bottom: 0;
      width: 100%;
    }
    .configurator .btn {
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      background: var(--color-accent);
      color: var(--color-accent-text);
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .configurator .btn:hover {
      opacity: 0.9;
    }
    .configurator .btn-secondary {
      background: var(--color-surface);
      color: var(--color-text);
      border: 1px solid var(--color-border);
      padding: 8px 14px;
      font-size: 0.85rem;
    }
    .configurator .btn-secondary:hover {
      background: var(--color-border);
    }
    .configurator .add-link-wrap {
      display: flex;
      justify-content: center;
      margin-top: 12px;
      margin-bottom: 0;
    }
    .configurator .add-link,
    .configurator .add-heading {
      margin-top: 6px;
      margin-bottom: 0;
    }
    .configurator .download-section {
      margin-top: 32px;
      padding-top: 24px;
      text-align: center;
      border-top: 1px solid var(--color-border);
    }
    .configurator .download-section p {
      font-size: 0.9rem;
      color: var(--color-text-muted);
      margin-bottom: 16px;
    }
    .configurator .back-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 0.9rem;
      color: var(--color-text-muted);
      text-decoration: none;
    }
    .configurator .back-link:hover {
      color: var(--color-accent);
    }
    .configurator #status {
      font-size: 0.9rem;
      margin-top: 12px;
      min-height: 1.5em;
    }
    .configurator #status.loading {
      color: var(--color-accent);
    }
    .configurator #status.error {
      color: #ff6b6b;
    }

    /* Icon picker */
    .link-row-fields {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .link-row-fields .icon-picker-trigger {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      font-size: 18px;
    }
    .configurator .link-row .link-row-fields .icon-picker-trigger {
      width: 34px;
      height: 34px;
      font-size: 16px;
    }
    .link-row-fields .link-field {
      flex: 1;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .link-row-fields .link-field:first-of-type {
      flex: 0 1 auto;
      max-width: 110px;
      min-width: 70px;
    }
    .link-row-fields .link-field label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--color-text-muted);
      margin-bottom: 0;
    }
    .link-row-fields .link-field input {
      margin-bottom: 0;
      padding: 6px 10px;
      font-size: 0.9rem;
    }
    .icon-picker-trigger {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 20px;
    }
    .icon-picker-trigger:hover {
      color: var(--color-accent);
      border-color: var(--color-accent);
    }
    .icon-picker-trigger:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }
    .icon-picker-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: transparent;
    }
    .icon-picker-popover {
      position: fixed;
      z-index: 1001;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 0;
      width: 320px;
      max-height: 360px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .icon-picker-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid var(--color-border);
      flex-shrink: 0;
    }
    .icon-picker-header span {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--color-text-muted);
    }
    .icon-picker-close {
      width: 32px;
      height: 32px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 18px;
    }
    .icon-picker-close:hover {
      background: var(--color-border);
      color: var(--color-text);
    }
    .icon-picker-scroll {
      overflow-y: auto;
      padding: 12px;
    }
    .icon-picker-footer {
      padding: 8px 12px;
      border-top: 1px solid var(--color-border);
      font-size: 0.75rem;
      color: var(--color-text-muted);
      flex-shrink: 0;
    }
    .icon-picker-footer a {
      color: var(--color-accent);
      text-decoration: none;
    }
    .icon-picker-footer a:hover {
      text-decoration: underline;
    }
    .icon-picker-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    .icon-picker-btn {
      width: 40px;
      height: 40px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 20px;
    }
    .icon-picker-btn:hover {
      background: color-mix(in srgb, var(--color-accent) 20%, transparent);
      color: var(--color-accent);
    }
    .icon-picker-btn[data-selected="true"] {
      background: color-mix(in srgb, var(--color-accent) 25%, transparent);
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <div class="configurator">
    <a href="index.html" class="back-link">← Back to Limn</a>
    <h1>Limn configurator</h1>
    <p class="subtitle">Fill in your details, then download a ready-to-deploy zip.</p>

    <form id="form">
      <label for="name">Display Name</label>
      <input type="text" id="name" required placeholder="Your name" maxlength="80">

      <label for="bio">Bio (optional)</label>
      <input type="text" id="bio" placeholder="A short line about you" maxlength="300">

      <label for="theme">Theme</label>
      <select id="theme">
        <option value="dark">dark</option>
        <option value="scarlet">scarlet</option>
        <option value="light">light</option>
        <option value="nord">nord</option>
        <option value="dracula">dracula</option>
        <option value="catppuccin">catppuccin</option>
        <option value="gruvbox">gruvbox</option>
        <option value="solarized">solarized</option>
        <option value="retro">retro</option>
        <option value="monokai">monokai</option>
        <option value="pink-pony-club">pink-pony-club</option>
        <option value="mocha">mocha</option>
      </select>

      <div class="tiles-section">
        <label>Pages & tiles</label>
        <p class="links-hint">Add pages, then add tiles to each. Use a linksbar with showLabels for page nav.</p>
        <div id="pages-stack"></div>
        <div class="add-page-wrap">
          <button type="button" class="btn btn-secondary add-page-btn" id="addPageBtn"><i class="ti ti-circle-plus"></i> Add page</button>
        </div>
      </div>

      <div class="download-section">
        <button type="submit" class="btn" id="downloadBtn">Download zip</button>
        <p id="status"></p>
      </div>
    </form>
  </div>

  <script type="module">
    const PICKER_ICONS = [
      "brand-github", "brand-instagram", "brand-x", "brand-linkedin", "brand-youtube",
      "brand-facebook", "brand-tiktok", "brand-discord", "brand-mastodon", "brand-bluesky",
      "brand-telegram", "brand-whatsapp", "brand-slack", "brand-spotify", "brand-twitch",
      "brand-reddit", "brand-pinterest", "brand-snapchat", "brand-apple", "brand-android",
      "brand-google", "brand-paypal", "brand-strava", "brand-soundcloud",
      "brand-vimeo", "brand-kickstarter", "brand-patreon", "brand-dribbble", "brand-behance",
      "brand-figma", "brand-framer", "brand-codepen", "brand-npm", "brand-css3",
      "brand-html5", "brand-javascript", "brand-python", "brand-react", "brand-vue",
      "mail", "mail-opened", "world", "link", "external-link", "rss",
      "heart", "star", "share",
      "calendar", "calendar-event", "map-pin", "map-pins", "phone", "phone-call",
      "message", "message-circle", "message-2", "send", "at", "home",
      "user", "users", "user-plus", "settings", "search", "bookmark",
      "tag", "camera", "photo", "file", "file-text", "folder", "download", "upload",
      "inbox", "bell", "gift", "coffee", "music", "video", "microphone",
      "pencil", "trash", "plus", "minus", "check", "x", "arrow-right", "arrow-left",
      "brand-amazon", "brand-medium"
    ];

    const ICON_ALIASES = {
      github: "brand-github", instagram: "brand-instagram", twitter: "brand-x", x: "brand-x",
      linkedin: "brand-linkedin", youtube: "brand-youtube", facebook: "brand-facebook",
      globe: "world", mail: "mail", link: "link"
    };

    function getTablerIconName(name) {
      if (!name) return "link";
      const n = name.trim().toLowerCase();
      return ICON_ALIASES[n] ?? n;
    }

    function updateIconTrigger(trigger) {
      const input = trigger.closest(".link-row-fields")?.querySelector(".link-icon")
        || trigger.closest(".page-header-field")?.querySelector(".page-icon-input");
      const i = trigger.querySelector("i");
      if (i && input) {
        const name = getTablerIconName(input.value);
        i.className = `ti ti-${name}`;
      }
    }

    function createIconPicker() {
      const overlay = document.createElement("div");
      overlay.className = "icon-picker-overlay";
      overlay.hidden = true;

      const popover = document.createElement("div");
      popover.className = "icon-picker-popover";

      const header = document.createElement("div");
      header.className = "icon-picker-header";
      header.innerHTML = `<span>Pick an icon</span><button type="button" class="icon-picker-close" title="Close" aria-label="Close"><i class="ti ti-x"></i></button>`;
      header.querySelector(".icon-picker-close").onclick = closePicker;

      const scroll = document.createElement("div");
      scroll.className = "icon-picker-scroll";

      const grid = document.createElement("div");
      grid.className = "icon-picker-grid";
      for (const icon of PICKER_ICONS) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "icon-picker-btn";
        btn.title = icon;
        btn.setAttribute("aria-label", icon);
        const i = document.createElement("i");
        i.className = `ti ti-${icon}`;
        btn.appendChild(i);
        btn.dataset.icon = icon;
        grid.appendChild(btn);
      }
      scroll.appendChild(grid);
      const footer = document.createElement("div");
      footer.className = "icon-picker-footer";
      footer.innerHTML = '6,000+ icons at <a href="https://tabler.io/icons" target="_blank" rel="noopener noreferrer">Tabler Icons</a> — use any icon name in your downloaded config.';
      popover.appendChild(header);
      popover.appendChild(scroll);
      popover.appendChild(footer);
      overlay.appendChild(popover);

      overlay.onclick = (e) => {
        if (e.target === overlay) closePicker();
      };

      grid.onclick = (e) => {
        const btn = e.target.closest(".icon-picker-btn");
        if (!btn) return;
        const icon = btn.dataset.icon;
        if (currentIconInput) {
          currentIconInput.value = icon;
          const trigger = currentIconInput.closest(".link-row-fields")?.querySelector(".icon-picker-trigger")
            || currentIconInput.closest(".page-header-field")?.querySelector(".page-icon-trigger");
          if (trigger) updateIconTrigger(trigger);
          const pg = currentIconInput.closest(".page-group");
          if (pg) updatePageTitleBar(pg);
        }
        closePicker();
      };

      document.body.appendChild(overlay);
      return { overlay, popover, grid };
    }

    function updatePickerPosition() {
      if (!picker || !currentIconInput || picker.overlay.hidden) return;
      const wrap = currentIconInput.closest(".link-row-fields") || currentIconInput.closest(".page-header-field");
      const trigger = wrap?.querySelector(".icon-picker-trigger") || wrap?.querySelector(".page-icon-trigger");
      const rect = (trigger || currentIconInput).getBoundingClientRect();
      const popover = picker.popover;
      const popoverH = 360;
      const spaceBelow = window.innerHeight - rect.bottom;
      const spaceAbove = rect.top;
      const showBelow = spaceBelow >= popoverH || spaceBelow >= spaceAbove;
      popover.style.left = `${Math.min(Math.max(rect.left, 8), window.innerWidth - 328)}px`;
      popover.style.top = showBelow ? `${rect.bottom + 8}px` : "auto";
      popover.style.bottom = showBelow ? "auto" : `${window.innerHeight - rect.top + 8}px`;
    }

    let picker = null;
    let currentIconInput = null;

    function openPicker(input) {
      if (!picker) picker = createIconPicker();
      currentIconInput = input;
      picker.overlay.hidden = false;

      updatePickerPosition();

      const current = getTablerIconName(input.value);
      picker.grid.querySelectorAll(".icon-picker-btn").forEach(btn => {
        btn.dataset.selected = btn.dataset.icon === current ? "true" : "false";
      });

      const onKey = (e) => {
        if (e.key === "Escape") closePicker();
      };
      document.addEventListener("keydown", onKey);
      picker.overlay._escapeHandler = onKey;

      const onScrollOrResize = () => updatePickerPosition();
      window.addEventListener("scroll", onScrollOrResize, true);
      window.addEventListener("resize", onScrollOrResize);
      picker.overlay._scrollHandler = onScrollOrResize;
    }

    function closePicker() {
      if (picker) {
        picker.overlay.hidden = true;
        if (picker.overlay._escapeHandler) {
          document.removeEventListener("keydown", picker.overlay._escapeHandler);
          picker.overlay._escapeHandler = null;
        }
        if (picker.overlay._scrollHandler) {
          window.removeEventListener("scroll", picker.overlay._scrollHandler, true);
          window.removeEventListener("resize", picker.overlay._scrollHandler);
          picker.overlay._scrollHandler = null;
        }
      }
      currentIconInput = null;
    }

    const baseUrl = location.href.replace(/configurator\.html.*$/, "") + "site/";
    const WIKI_BASE = "https://github.com/ravendarque/ravendarque-limn/wiki";
    const TILE_WIKI_URL = (type) => {
      if (type === "embed") return `${WIKI_BASE}/Embeds`;
      if (type === "calendar") return `${WIKI_BASE}/Calendar`;
      if (type === "pagenav") return `${WIKI_BASE}/Pages`;
      return `${WIKI_BASE}/Tiles#${type}`;
    };

    function escapeYaml(str) {
      if (!str) return "";
      if (/[:\#\*&\{\}\[\]\|>'"%@`\s]/.test(str)) return JSON.stringify(str);
      return str;
    }

    function buildConfig() {
      const name = document.getElementById("name").value.trim();
      const bio = document.getElementById("bio").value.trim();
      const theme = document.getElementById("theme").value;

      let pagesYaml = "";
      const pageGroups = document.querySelectorAll("#pages-stack > .page-group");
      for (const pg of pageGroups) {
        const pageId = pg.querySelector(".page-id-input")?.value.trim() || "home";
        const pageTitle = pg.querySelector(".page-title-input")?.value.trim() || "Home";
        const pageIcon = pg.querySelector(".page-icon-input")?.value.trim() || "home";
        const hideFromNavbar = !(pg.querySelector(".page-show-in-nav")?.checked ?? true);

        let tilesYaml = "";
        const blocks = pg.querySelectorAll(".page-tiles > .tile-block");
        for (const block of blocks) {
        const type = block.dataset.type;
        if (type === "heading") {
          const text = block.querySelector(".heading-input")?.value.trim();
          if (text) {
            tilesYaml += `  - type: heading
    text: ${escapeYaml(text)}
`;
          }
        } else if (type === "text") {
          const content = block.querySelector(".text-content")?.value.trim();
          if (content) {
            tilesYaml += `  - type: text
    content: ${escapeYaml(content)}
`;
          }
        } else if (type === "image") {
          const url = block.querySelector(".image-url")?.value.trim();
          const alt = block.querySelector(".image-alt")?.value.trim();
          if (url) {
            tilesYaml += `  - type: image
    url: ${escapeYaml(url)}
`;
            if (alt) tilesYaml += `    alt: ${escapeYaml(alt)}
`;
          }
        } else if (type === "link") {
          const url = block.querySelector(".link-tile-url")?.value.trim();
          const label = block.querySelector(".link-tile-label")?.value.trim();
          const icon = block.querySelector(".link-tile-icon")?.value.trim();
          if (url && label) {
            tilesYaml += `  - type: link
    url: ${escapeYaml(url)}
    label: ${escapeYaml(label)}
`;
            if (icon) tilesYaml += `    icon: ${icon}
`;
          }
        } else if (type === "linksbar") {
          const linkRows = block.querySelectorAll(".link-row");
          const items = [];
          for (const row of linkRows) {
            const label = row.querySelector(".link-label")?.value.trim();
            const url = row.querySelector(".link-url")?.value.trim();
            const icon = row.querySelector(".link-icon")?.value.trim();
            if (!url || !icon) continue;
            items.push({ icon, url, label: label || icon });
          }
          const showLabels = block.querySelector(".linksbar-show-labels")?.checked;
          if (items.length > 0) {
            tilesYaml += `  - type: linksbar
    surface: hide
`;
            if (showLabels) tilesYaml += `    showLabels: true
`;
            tilesYaml += `    items:
`;
            for (const item of items) {
              tilesYaml += `      - icon: ${item.icon}
        url: ${escapeYaml(item.url)}
        label: ${escapeYaml(item.label)}
`;
            }
          }
        } else if (type === "pagenav") {
          const showLabels = block.querySelector(".pagenav-show-labels")?.checked ?? true;
          tilesYaml += `  - type: pagenav
    surface: hide
`;
          if (showLabels) tilesYaml += `    showLabels: true
`;
        } else if (type === "embed") {
          const html = block.querySelector(".embed-html")?.value.trim();
          const title = block.querySelector(".embed-title")?.value.trim();
          if (html) {
            tilesYaml += `  - type: embed
    html: ${escapeYaml(html)}
`;
            if (title) tilesYaml += `    title: ${escapeYaml(title)}
`;
          }
        } else if (type === "calendar") {
          const window = block.querySelector(".calendar-window")?.value;
          const src = block.querySelector(".calendar-src")?.value.trim();
          if (window && src) {
            tilesYaml += `  - type: calendar
    window: ${window}
    src: ${escapeYaml(src)}
`;
          }
        }
        }

        pagesYaml += `  - id: ${escapeYaml(pageId)}
    title: ${escapeYaml(pageTitle)}
    icon: ${pageIcon}
`;
        if (hideFromNavbar) pagesYaml += `    hide-from-navbar: true
`;
        pagesYaml += `    tiles:
`;
        pagesYaml += tilesYaml.split("\n").map(line => (line ? "    " + line : "")).join("\n");
      }

      return `profile:
  name: ${escapeYaml(name)}
${bio ? `  bio: ${escapeYaml(bio)}\n` : ""}  image: avatar.jpg

theme: ${theme}

pages:
` + pagesYaml;
    }

    const STORAGE_KEY = "limn-configurator-state";

    function getConfigState() {
      const name = document.getElementById("name").value.trim();
      const bio = document.getElementById("bio").value.trim();
      const theme = document.getElementById("theme").value;
      const pages = [];
      const pageGroups = document.querySelectorAll("#pages-stack > .page-group");
      for (const pg of pageGroups) {
        const pageId = pg.querySelector(".page-id-input")?.value.trim() || "home";
        const pageTitle = pg.querySelector(".page-title-input")?.value.trim() || "Home";
        const pageIcon = pg.querySelector(".page-icon-input")?.value.trim() || "home";
        const hideFromNavbar = !(pg.querySelector(".page-show-in-nav")?.checked ?? true);
        const tiles = [];
        const blocks = pg.querySelectorAll(".page-tiles > .tile-block");
        for (const block of blocks) {
          const type = block.dataset.type;
          const tile = { type };
          if (type === "heading") {
            const text = block.querySelector(".heading-input")?.value.trim();
            if (text) tile.text = text;
          } else if (type === "text") {
            const content = block.querySelector(".text-content")?.value.trim();
            if (content) tile.content = content;
          } else if (type === "image") {
            const url = block.querySelector(".image-url")?.value.trim();
            const alt = block.querySelector(".image-alt")?.value.trim();
            if (url) {
              tile.url = url;
              if (alt) tile.alt = alt;
            }
          } else if (type === "link") {
            const url = block.querySelector(".link-tile-url")?.value.trim();
            const label = block.querySelector(".link-tile-label")?.value.trim();
            const icon = block.querySelector(".link-tile-icon")?.value.trim();
            if (url && label) {
              tile.url = url;
              tile.label = label;
              if (icon) tile.icon = icon;
            }
          } else if (type === "linksbar") {
            const linkRows = block.querySelectorAll(".link-row");
            const items = [];
            for (const row of linkRows) {
              const label = row.querySelector(".link-label")?.value.trim();
              const url = row.querySelector(".link-url")?.value.trim();
              const icon = row.querySelector(".link-icon")?.value.trim();
              if (!url || !icon) continue;
              items.push({ icon, url, label: label || icon });
            }
            tile.showLabels = block.querySelector(".linksbar-show-labels")?.checked ?? false;
            tile.items = items;
          } else if (type === "pagenav") {
            tile.showLabels = block.querySelector(".pagenav-show-labels")?.checked ?? true;
          } else if (type === "embed") {
            const html = block.querySelector(".embed-html")?.value.trim();
            const title = block.querySelector(".embed-title")?.value.trim();
            if (html) {
              tile.html = html;
              if (title) tile.title = title;
            }
          } else if (type === "calendar") {
            const window = block.querySelector(".calendar-window")?.value;
            const src = block.querySelector(".calendar-src")?.value.trim();
            if (window && src) {
              tile.window = window;
              tile.src = src;
            }
          }
          tiles.push(tile);
        }
        pages.push({ id: pageId, title: pageTitle, icon: pageIcon, hideFromNavbar, tiles });
      }
      return { profile: { name, bio }, theme, pages };
    }

    function populateTileBlock(block, tile) {
      const type = block.dataset.type;
      if (type === "heading") {
        if (tile.text !== undefined) block.querySelector(".heading-input").value = tile.text;
      } else if (type === "text") {
        if (tile.content !== undefined) block.querySelector(".text-content").value = tile.content;
      } else if (type === "image") {
        if (tile.url !== undefined) block.querySelector(".image-url").value = tile.url;
        if (tile.alt !== undefined) block.querySelector(".image-alt").value = tile.alt;
      } else if (type === "link") {
        if (tile.url !== undefined) block.querySelector(".link-tile-url").value = tile.url;
        if (tile.label !== undefined) block.querySelector(".link-tile-label").value = tile.label;
        if (tile.icon !== undefined) {
          block.querySelector(".link-tile-icon").value = tile.icon;
          updateIconTrigger(block.querySelector(".icon-picker-trigger"));
        }
      } else if (type === "linksbar") {
        block.querySelector(".linksbar-show-labels").checked = !!tile.showLabels;
        const linksDiv = block.querySelector(".links-section");
        linksDiv.querySelectorAll(".link-row").forEach(r => r.remove());
        for (const item of (tile.items || [])) {
          addLinkRow(linksDiv, item.label || "", item.url || "", item.icon || "link");
        }
      } else if (type === "pagenav") {
        block.querySelector(".pagenav-show-labels").checked = !!tile.showLabels;
      } else if (type === "embed") {
        if (tile.html !== undefined) block.querySelector(".embed-html").value = tile.html;
        if (tile.title !== undefined) block.querySelector(".embed-title").value = tile.title;
      } else if (type === "calendar") {
        if (tile.window !== undefined) block.querySelector(".calendar-window").value = tile.window;
        if (tile.src !== undefined) block.querySelector(".calendar-src").value = tile.src;
      }
    }

    function loadConfigState(state) {
      if (!state || !state.pages?.length) return;
      document.getElementById("name").value = state.profile?.name ?? "";
      document.getElementById("bio").value = state.profile?.bio ?? "";
      document.getElementById("theme").value = state.theme ?? "light";
      const pagesStack = document.getElementById("pages-stack");
      pagesStack.innerHTML = "";
      for (let i = 0; i < state.pages.length; i++) {
        const p = state.pages[i];
        const isHome = i === 0;
        const tilesContainer = createPageGroup(p.id || "home", p.title || "Home", p.icon || "home", isHome);
        const pg = tilesContainer.closest(".page-group");
        pg.querySelector(".page-show-in-nav").checked = !(p.hideFromNavbar ?? false);
        for (const tile of p.tiles || []) {
          if (!tile.type) continue;
          const block = createTileBlock(tile.type, tilesContainer);
          populateTileBlock(block, tile);
        }
      }
      document.querySelectorAll(".page-group.selected").forEach(p => p.classList.remove("selected"));
      pagesStack.querySelector(".page-group")?.classList.add("selected");
      updatePageMoveButtons();
    }

    let saveTimeout = null;
    function saveConfigState() {
      try {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify(getConfigState()));
      } catch (_) {}
    }
    function debouncedSave() {
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveConfigState, 300);
    }

        const down = row.querySelector(".link-move-down");
        if (up) up.disabled = i === 0;
        if (down) down.disabled = i === rows.length - 1;
      });

          <div class="tile-field">
            <label>Embed HTML</label>
            <textarea class="embed-html" placeholder="Paste iframe from Share → Embed..." rows="4" style="font-family:monospace;font-size:0.8rem" maxlength="8000"></textarea>
          </div>
        `;
      } else if (type === "calendar") {
        body.innerHTML = `
          <div class="tile-field">
            <label>Window</label>
            <select class="calendar-window">
              <option value="today">Today</option>
              <option value="week">Week</option>
              <option value="month" selected>Month</option>
              <option value="year">Year</option>
            </select>
          </div>
          <div class="tile-field">
            <label>URL (relative or absolute)</label>
            <input type="text" class="calendar-src" placeholder="example.ics or https://..." value="example.ics" maxlength="500">
          </div>
        `;
      }

      function updateAllMoveButtons() {
        stack.querySelectorAll(".tile-block").forEach(b => {
          b.querySelector(".tile-move-up").disabled = !b.previousElementSibling;
          b.querySelector(".tile-move-down").disabled = !b.nextElementSibling;
        });
      }
      block.querySelector(".tile-move-up").onclick = () => {
        const prev = block.previousElementSibling;
        if (prev) {
          stack.insertBefore(block, prev);
          updateAllMoveButtons();
        }
      };
      block.querySelector(".tile-move-down").onclick = () => {
        const next = block.nextElementSibling;
        if (next) {
          stack.insertBefore(next, block);
          updateAllMoveButtons();
        }
      };
      block.querySelector(".tile-remove").onclick = () => {
        block.remove();
        updateAllMoveButtons();
      };

      if (insertBefore) {
        stack.insertBefore(block, insertBefore);
      } else {
        stack.appendChild(block);
      }
      updateAllMoveButtons();
      return block;
    }

    (function initAddTileDropdown() {
      document.addEventListener("click", (e) => {
        const btn = e.target.closest(".add-tile-btn-main");
        if (btn) {
          e.stopPropagation();
          const wrap = btn.closest(".add-tile-wrap");
          const dropdown = wrap?.querySelector(".add-tile-dropdown");
          if (!wrap || !dropdown) return;
          const isOpen = dropdown.classList.contains("open");
          document.querySelectorAll(".add-tile-dropdown.open").forEach(d => d.classList.remove("open"));
          document.querySelectorAll(".add-tile-wrap.open").forEach(w => w.classList.remove("open"));
          if (!isOpen) {
            dropdown.classList.add("open");
            wrap.classList.add("open");
            btn.setAttribute("aria-expanded", "true");
          } else {
            btn.setAttribute("aria-expanded", "false");
          }
          return;
        }
        const opt = e.target.closest(".add-tile-option");
        if (opt) {
          e.stopPropagation();
          const wrap = opt.closest(".add-tile-wrap");
          const pg = wrap?.closest(".page-group");
          const container = pg?.querySelector(".page-tiles");
          if (!container) return;
          createTileBlock(opt.dataset.type, container);
          wrap?.classList.remove("open");
          wrap?.querySelector(".add-tile-dropdown")?.classList.remove("open");
          wrap?.querySelector(".add-tile-btn-main")?.setAttribute("aria-expanded", "false");
          return;
        }
        if (!e.target.closest(".add-tile-wrap")) {
          document.querySelectorAll(".add-tile-dropdown.open").forEach(d => d.classList.remove("open"));
          document.querySelectorAll(".add-tile-wrap.open").forEach(w => w.classList.remove("open"));
          document.querySelectorAll(".add-tile-btn-main[aria-expanded='true']").forEach(b => b.setAttribute("aria-expanded", "false"));
        }
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          document.querySelectorAll(".add-tile-dropdown.open").forEach(d => d.classList.remove("open"));
          document.querySelectorAll(".add-tile-wrap.open").forEach(w => w.classList.remove("open"));
          document.querySelectorAll(".add-tile-btn-main[aria-expanded='true']").forEach(b => b.setAttribute("aria-expanded", "false"));
        }
      });
    })();

    function createPageGroup(pageId = "home", title = "Home", icon = "home", isHome = false) {
      const pagesStack = document.getElementById("pages-stack");
      const pg = document.createElement("div");
      pg.className = "page-group" + (isHome ? " page-home" : "");
      pg.dataset.pageId = pageId;
      pg.innerHTML = `
        <div class="page-title-bar">
          <span class="page-title-label"><i class="ti ti-${(icon || "home").replace(/"/g, "&quot;")}"></i> ${(title || "Home").replace(/"/g, "&quot;")}</span>
          <a href="${WIKI_BASE}/Pages" target="_blank" rel="noopener noreferrer" class="tile-help-link" title="View docs"><i class="ti ti-help-circle"></i></a>
          <div class="tile-block-actions page-actions">
            <button type="button" class="btn btn-secondary page-move-up" title="Move up"><i class="ti ti-chevron-up"></i></button>
            <button type="button" class="btn btn-secondary page-move-down" title="Move down"><i class="ti ti-chevron-down"></i></button>
            <button type="button" class="btn btn-secondary page-remove" title="Remove">×</button>
          </div>
        </div>
        <div class="page-header">
          <div class="page-header-fields">
            <div class="page-header-field">
              <button type="button" class="btn btn-secondary icon-picker-trigger page-icon-trigger" title="Pick icon"><i class="ti ti-${(icon || "home").replace(/"/g, "&quot;")}"></i></button>
              <input type="hidden" class="page-icon-input" value="${(icon || "home").replace(/"/g, "&quot;")}">
            </div>
            <div class="page-header-field">
              <label>ID</label>
              <input type="text" class="page-id-input" placeholder="home" value="${(pageId || "home").replace(/"/g, "&quot;")}" pattern="[a-z0-9_-]+" title="Lowercase letters, numbers, hyphens, underscores only" maxlength="64">
            </div>
            <div class="page-header-field">
              <label>Title</label>
              <input type="text" class="page-title-input" placeholder="Home" value="${(title || "Home").replace(/"/g, "&quot;")}" maxlength="80">
            </div>
            <div class="page-header-field page-header-field-nav">
              <label>Navigation</label>
              <label class="toggle-switch">
                <input type="checkbox" class="page-show-in-nav" checked>
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>
        <div class="page-tiles"></div>
        <div class="add-tile-wrap">
          <button type="button" class="btn btn-secondary add-tile-btn-main" aria-haspopup="true" aria-expanded="false">
            <i class="ti ti-circle-plus"></i>
            Add tile
            <i class="ti ti-chevron-down add-tile-chevron"></i>
          </button>
          <div class="add-tile-dropdown" role="menu">
            <button type="button" class="add-tile-option" role="menuitem" data-type="heading"><i class="ti ti-heading"></i> Heading</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="text"><i class="ti ti-article"></i> Text</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="image"><i class="ti ti-photo"></i> Image</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="link"><i class="ti ti-link"></i> Link</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="linksbar"><i class="ti ti-apps"></i> Links bar</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="pagenav"><i class="ti ti-layout-navbar"></i> Navigation bar</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="embed"><i class="ti ti-video"></i> Embed</button>
            <button type="button" class="add-tile-option" role="menuitem" data-type="calendar"><i class="ti ti-calendar"></i> Calendar</button>
          </div>
        </div>
      `;
      const tilesContainer = pg.querySelector(".page-tiles");
      pg.onclick = (e) => {
        if (e.target.closest(".add-tile-wrap")) return;
        document.querySelectorAll(".page-group.selected").forEach(p => p.classList.remove("selected"));
        pg.classList.add("selected");
      };
      if (!isHome) {
      pg.querySelector(".page-move-up").onclick = (e) => { e.stopPropagation();
        const prev = pg.previousElementSibling;
        if (prev) {
          pagesStack.insertBefore(pg, prev);
          updatePageMoveButtons();
        }
      };
      pg.querySelector(".page-move-down").onclick = (e) => { e.stopPropagation();
        const next = pg.nextElementSibling;
        if (next) {
          pagesStack.insertBefore(next, pg);
          updatePageMoveButtons();
        }
      };
      pg.querySelector(".page-remove").onclick = (e) => { e.stopPropagation();
        if (pagesStack.querySelectorAll(".page-group").length <= 1) return;
        pg.remove();
        updatePageMoveButtons();
      };
      }
      pagesStack.appendChild(pg);
      if (isHome) {
        pg.querySelector(".page-actions")?.remove();
      }
      pg.classList.add("selected");
      const iconTrigger = pg.querySelector(".page-icon-trigger");
      const iconInput = pg.querySelector(".page-icon-input");
      if (iconTrigger && iconInput) {
        updateIconTrigger(iconTrigger);
        iconTrigger.onclick = (e) => { e.stopPropagation(); openPicker(iconInput); };
      }
      const titleInput = pg.querySelector(".page-title-input");
      if (titleInput) {
        titleInput.oninput = () => updatePageTitleBar(pg);
      }
      const idInput = pg.querySelector(".page-id-input");
      if (idInput) {
        idInput.oninput = () => {
          const v = idInput.value.replace(/[^a-z0-9_-]/g, "").toLowerCase();
          if (v !== idInput.value) idInput.value = v;
          pg.dataset.pageId = idInput.value.trim() || "home";
        };
      }
      updatePageMoveButtons();
      return tilesContainer;
    }
    function updatePageTitleBar(pg) {
      const label = pg.querySelector(".page-title-label");
      const title = pg.querySelector(".page-title-input")?.value.trim() || "Home";
      const icon = pg.querySelector(".page-icon-input")?.value.trim() || "home";
      if (label) {
        label.innerHTML = `<i class="ti ti-${icon.replace(/"/g, "&quot;")}"></i> ${title.replace(/</g, "&lt;").replace(/>/g, "&gt;")}`;
      }
    }
    function updatePageMoveButtons() {
      const pages = document.querySelectorAll("#pages-stack > .page-group:not(.page-home)");
      pages.forEach((pg, i) => {
        const up = pg.querySelector(".page-move-up");
        const down = pg.querySelector(".page-move-down");
        if (up) up.disabled = i === 0;
        if (down) down.disabled = i === pages.length - 1;
      });
    }
    function initConfigurator() {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEY);
        if (raw) {
          const state = JSON.parse(raw);
          loadConfigState(state);
          return;
        }
      } catch (_) {}
      createPageGroup("home", "Home", "home", true);
    }
    initConfigurator();

    document.querySelector(".configurator").addEventListener("input", (e) => {
      const el = e.target;
      if (el.tagName === "INPUT" && el.type === "text" && /[\r\n]/.test(el.value)) {
        el.value = el.value.replace(/[\r\n]+/g, " ");
      }
      debouncedSave();
    });
    document.querySelector(".configurator").addEventListener("change", () => debouncedSave());
    document.querySelector(".configurator").addEventListener("click", (e) => {
      if (e.target.closest(".add-link, .add-tile-option, #addPageBtn, .page-remove, .tile-remove, .link-remove, .page-move-up, .page-move-down, .tile-move-up, .tile-move-down, .link-move-up, .link-move-down")) {
        debouncedSave();
      }
    });

    document.getElementById("addPageBtn").onclick = () => {
      const pages = document.querySelectorAll("#pages-stack > .page-group");
      const n = pages.length + 1;
      const newPage = createPageGroup(`page${n}`, `Page ${n}`, "link");
      createTileBlock("pagenav", newPage);
    };

    document.getElementById("form").onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById("downloadBtn");
      const status = document.getElementById("status");
      btn.disabled = true;
      status.textContent = "Building zip…";
      status.className = "loading";

      try {
        const { default: JSZip } = await import("https://esm.sh/jszip@3.10.1");
        const zip = new JSZip();

        for (const file of FILES) {
          const res = await fetch(baseUrl + file);
          if (!res.ok) throw new Error(`Failed to fetch ${file}: ${res.status}`);
          const blob = await res.blob();
          zip.file(file, blob);
        }

        zip.file("config.yaml", buildConfig());

        const blob = await zip.generateAsync({ type: "blob" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "limn.zip";
        a.click();
        URL.revokeObjectURL(a.href);

        status.textContent = "Download started.";
        status.className = "";
      } catch (err) {
        status.textContent = err.message;
        status.className = "error";
      }
      btn.disabled = false;
    };
  </script>
</body>
</html>
